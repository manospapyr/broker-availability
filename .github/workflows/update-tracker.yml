name: Update Broker Availability Tracker
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  update-tracker:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright browsers
      run: |
        playwright install chromium --with-deps

    - name: Run Broker Availability Tracker
      env:
        GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
        SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
      run: python broker_tracker.py

    - name: Upload Excel artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: broker-availability-tracker
        path: Broker_Availability_Tracker.xlsx
        retention-days: 30

    - name: Log completion
      run: echo "✅ Broker tracker update completed at $(date)"
